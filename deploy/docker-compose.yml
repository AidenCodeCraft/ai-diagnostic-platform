services:
  postgres:
    image: postgres:16
    container_name: ai-diagnostic-postgres
    restart: always
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: diagnostic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-diagnostic-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: