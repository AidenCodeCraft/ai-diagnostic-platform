services:
  postgres:
    image: postgres:16
    container_name: ai-diagnostic-postgres
    restart: always
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: diagnostic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d diagnostic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ai-diagnostic-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ai-diagnostic-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ai:ai@postgres:5432/diagnostic
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/data/raw
      LLM_PROVIDER: mock
      DEBUG: "false"
    volumes:
      - upload_data:/app/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: ai-diagnostic-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
